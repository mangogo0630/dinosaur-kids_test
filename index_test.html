  width: 500px;

<body>
<div class="video-container">
  <video autoplay id="videoElement"></video>
  </div>
<canvas id="canvas" style="display:none;"></canvas>
<button onclick="uploadImage()" id="capture">Capture & Upload</button>
<p id="debugMsg">Debug Messages</p>
<script>
const video = document.getElementById("videoElement");

if (navigator.mediaDevices.getUserMedia) {
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(function (stream) {
      video.srcObject = stream;
    })
    .catch(function (err0r) {
      console.log("Something went wrong!");
    });
}

async function uploadImage() {
  const canvas = document.getElementById("canvas");
  const msg = document.getElementById("debugMsg");
  const ctx = canvas.getContext("2d");
  const vw = video.videoWidth;
  const vh = video.videoHeight;
  const size = Math.min(vw, vh);
  const sx = (vw - size) / 2;
  const sy = (vh - size) / 2;
  canvas.width = size;
  canvas.height = size;

  ctx.drawImage(
  video,
  sx, sy, size, size,   // source (crop)
  0, 0, size, size      // destination
  );
  const blob = await new Promise(r => canvas.toBlob(r, "image/jpeg", 0.6));

  const formData = new FormData();
  formData.append("image", blob);

  //query params
  const params = new Proxy(new URLSearchParams(window.location.search), {
  get: (searchParams, prop) => searchParams.get(prop),
  });
  let showID = params.showid ?? 'no_showid';
  formData.append("filename", "img_" + Date.now());
  formData.append("id", showID);
  formData.append("eggType", 0);
  formData.append("displayNameIndex1", 0);
  formData.append("displayNameIndex2", 0);

  try {
    const res = await fetch("/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (data.success) {
      msg.innerText = "Upload success:"+ data.filename;
      console.log("Upload success:", data.filename);
    } else {
      msg.innerText = "Upload failed:"+ data.error;
      console.error("Upload failed:", data.error);
    }

  } catch (err) {
    msg.innerText = "Network error:"+ err;
    console.error("Network error:", err);
  }
}
</script>
</body>
